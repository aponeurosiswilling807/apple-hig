<svg viewBox="0 0 1200 740" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="8" y="8" width="1184" height="724" rx="20" fill="#F5F5F7" stroke="#D2D2D7" stroke-width="1.5"/>

  <!-- Header -->
  <text x="48" y="56" font-size="32" font-weight="700" fill="#1D1D1F">Before and after apple-hig</text>
  <text x="48" y="86" font-size="16" fill="#6E6E73">The same iPhone sign-in screen — hardcoded and sub-spec, then aligned to Apple&#39;s Human Interface Guidelines.</text>

  <!-- BEFORE label -->
  <rect x="170" y="108" width="100" height="26" rx="13" fill="#FDE7E7" stroke="#FF3B30"/>
  <text x="220" y="126" font-size="13" font-weight="700" fill="#C0392B" text-anchor="middle">BEFORE</text>
  <!-- AFTER label -->
  <rect x="930" y="108" width="100" height="26" rx="13" fill="#E4F8E7" stroke="#34C759"/>
  <text x="980" y="126" font-size="13" font-weight="700" fill="#1E7B33" text-anchor="middle">AFTER</text>

  <!-- ===== BEFORE phone ===== -->
  <rect x="70" y="150" width="300" height="540" rx="46" fill="#FFFFFF" stroke="#1D1D1F" stroke-width="3"/>
  <rect x="190" y="172" width="60" height="16" rx="8" fill="#000000"/>
  <!-- low-contrast title -->
  <text x="104" y="252" font-size="19" font-weight="600" fill="#C2C2C7">Welcome back</text>
  <text x="232" y="251" font-size="12" font-weight="700" fill="#FF3B30">2.7:1</text>
  <!-- short hardcoded button -->
  <rect x="104" y="276" width="120" height="28" rx="5" fill="#3578F5"/>
  <text x="164" y="295" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">Continue</text>
  <text x="236" y="296" font-size="12" font-weight="700" fill="#FF3B30">30 pt</text>
  <!-- unlabeled heart -->
  <text x="104" y="352" font-size="26" fill="#3578F5">&#9829;</text>
  <text x="138" y="349" font-size="11" font-weight="600" fill="#FF3B30">no label</text>
  <!-- filler -->
  <rect x="104" y="378" width="150" height="9" rx="4.5" fill="#ECECEF"/>
  <rect x="104" y="398" width="104" height="9" rx="4.5" fill="#ECECEF"/>
  <text x="104" y="660" font-size="13" font-weight="600" fill="#C0392B">Hardcoded · low-contrast · light-only</text>

  <!-- ===== AFTER phone ===== -->
  <rect x="830" y="150" width="300" height="540" rx="46" fill="#FFFFFF" stroke="#1D1D1F" stroke-width="3"/>
  <rect x="950" y="172" width="60" height="16" rx="8" fill="#000000"/>
  <!-- strong title + subtitle -->
  <text x="866" y="248" font-size="20" font-weight="700" fill="#1D1D1F">Welcome back</text>
  <text x="866" y="272" font-size="14" fill="#6E6E73">Sign in to continue</text>
  <!-- capsule accent button, 44pt+ -->
  <rect x="860" y="296" width="240" height="46" rx="23" fill="#007AFF"/>
  <text x="980" y="325" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="middle">Continue</text>
  <!-- labeled heart -->
  <text x="866" y="386" font-size="24" fill="#FF3B30">&#9829;</text>
  <text x="898" y="385" font-size="15" font-weight="500" fill="#1D1D1F">Like</text>
  <!-- light + dark swatches -->
  <rect x="866" y="408" width="30" height="30" rx="7" fill="#FFFFFF" stroke="#C7C7CC"/>
  <rect x="902" y="408" width="30" height="30" rx="7" fill="#1C1C1E"/>
  <text x="942" y="428" font-size="13" fill="#6E6E73">Light + Dark</text>
  <text x="866" y="660" font-size="13" font-weight="600" fill="#1E7B33">Semantic · accessible · light + dark</text>

  <!-- ===== Middle: what changed ===== -->
  <rect x="396" y="170" width="408" height="470" rx="16" fill="#FFFFFF" stroke="#E5E5EA"/>
  <text x="420" y="208" font-size="18" font-weight="700" fill="#1D1D1F">What apple-hig changes</text>

  <!-- rows: property | before(red) -> after(green) -->
  <!-- row helper layout: property x=420 ; before end x=630 ; arrow x=638 ; after start x=660 -->
  <g font-size="14">
    <text x="420" y="252" fill="#424245">Tap target</text>
    <text x="630" y="252" font-weight="600" fill="#FF3B30" text-anchor="end">30 pt</text>
    <text x="639" y="252" fill="#9A9AA0">&#8594;</text>
    <text x="662" y="252" font-weight="600" fill="#248A3D">44 pt</text>

    <text x="420" y="306" fill="#424245">Button color</text>
    <text x="630" y="306" font-weight="600" fill="#FF3B30" text-anchor="end">#3578F5</text>
    <text x="639" y="306" fill="#9A9AA0">&#8594;</text>
    <text x="662" y="306" font-weight="600" fill="#248A3D">accent / semantic</text>

    <text x="420" y="360" fill="#424245">Text contrast</text>
    <text x="630" y="360" font-weight="600" fill="#FF3B30" text-anchor="end">2.7 : 1</text>
    <text x="639" y="360" fill="#9A9AA0">&#8594;</text>
    <text x="662" y="360" font-weight="600" fill="#248A3D">4.5 : 1 +</text>

    <text x="420" y="414" fill="#424245">Appearance</text>
    <text x="630" y="414" font-weight="600" fill="#FF3B30" text-anchor="end">light only</text>
    <text x="639" y="414" fill="#9A9AA0">&#8594;</text>
    <text x="662" y="414" font-weight="600" fill="#248A3D">light + dark</text>

    <text x="420" y="468" fill="#424245">Spacing</text>
    <text x="630" y="468" font-weight="600" fill="#FF3B30" text-anchor="end">13 pt</text>
    <text x="639" y="468" fill="#9A9AA0">&#8594;</text>
    <text x="662" y="468" font-weight="600" fill="#248A3D">8-pt grid</text>

    <text x="420" y="522" fill="#424245">Corner radius</text>
    <text x="630" y="522" font-weight="600" fill="#FF3B30" text-anchor="end">7 pt</text>
    <text x="639" y="522" fill="#9A9AA0">&#8594;</text>
    <text x="662" y="522" font-weight="600" fill="#248A3D">capsule</text>

    <text x="420" y="576" fill="#424245">Icon button</text>
    <text x="630" y="576" font-weight="600" fill="#FF3B30" text-anchor="end">no label</text>
    <text x="639" y="576" fill="#9A9AA0">&#8594;</text>
    <text x="662" y="576" font-weight="600" fill="#248A3D">VoiceOver label</text>
  </g>
  <line x1="420" y1="272" x2="780" y2="272" stroke="#F0F0F2"/>
  <line x1="420" y1="326" x2="780" y2="326" stroke="#F0F0F2"/>
  <line x1="420" y1="380" x2="780" y2="380" stroke="#F0F0F2"/>
  <line x1="420" y1="434" x2="780" y2="434" stroke="#F0F0F2"/>
  <line x1="420" y1="488" x2="780" y2="488" stroke="#F0F0F2"/>
  <line x1="420" y1="542" x2="780" y2="542" stroke="#F0F0F2"/>
  <text x="420" y="612" font-size="12" fill="#8E8E93">Flagged by the design-reviewer, fixed to spec.</text>

  <!-- Footer -->
  <text x="600" y="710" font-size="13" fill="#8E8E93" text-anchor="middle">Aligned to Apple&#39;s Human Interface Guidelines  ·  github.com/elevatormusic/apple-hig</text>
</svg>
