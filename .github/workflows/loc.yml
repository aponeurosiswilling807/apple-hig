name: Lines of code

# Keeps docs/loc.svg (the README chart) current. Regenerates it whenever code or
# the HIG reference changes, plus a weekly refresh, and commits the SVG back only
# when the counts actually moved. The generator is idempotent, so an unchanged
# count produces no commit (and no loop).

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/loc.svg'
  schedule:
    - cron: '17 6 * * 1'   # Mondays, 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  loc:
    # never react to our own [skip ci] commit
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate the lines-of-code chart
        run: node scripts/loc-graph.mjs

      - name: Commit if the chart changed
        run: |
          if [ -n "$(git status --porcelain docs/loc.svg)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/loc.svg
            git commit -m "chore: refresh lines-of-code chart [skip ci]"
            git push
          else
            echo "docs/loc.svg unchanged — nothing to commit."
          fi
